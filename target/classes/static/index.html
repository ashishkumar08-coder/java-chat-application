<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Chat | Client</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="username-page">
        <div class="glass-card">
            <h2>Welcome to Universal Chat</h2>
            <input type="text" id="name" placeholder="Enter your name..." autocomplete="off" />
            <button onclick="connect()">Join Chat</button>
        </div>
    </div>

    <div id="chat-page" class="hidden">
        <div class="chat-container">
            <div class="chat-header">
                <div class="user-info">
                    <div class="status-dot"></div>
                    <h2>Global Room</h2>
                </div>
                <div class="header-actions">
                    <span id="typing-indicator"></span>
                </div>
            </div>
            <ul id="messageArea"></ul>
            <div class="input-area">
                <input type="text" id="message" placeholder="Type @bot for help or Translate to Spanish: Hello..." />
                <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- SockJS and STOMP Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
