<!DOCTYPE html>
<html>
<head>
    <title>Admin Vault</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body style="background: #000;">
    <div class="glass-card" style="width: 80%; max-width: 800px;">
        <h2>🛡️ Server Encryption Monitor</h2>
        <div id="admin-logs" style="height: 400px; overflow-y: auto; text-align: left; font-family: monospace; background: #111; padding: 15px; border-radius: 10px;"></div>
        <button onclick="decryptAll()" style="background: #10b981; margin-top: 10px;">Decrypt Vault</button>
    </div>
    <script>
        var socket = new SockJS('/ws-chat');
        var stompClient = Stomp.over(socket);
        stompClient.connect({}, function() {
            stompClient.subscribe('/topic/public', function(sdkEvent) {
                var msg = JSON.parse(sdkEvent.body);
                var log = document.getElementById('admin-logs');
                log.innerHTML += `<p style="color:red;">[ENC]: ${btoa(msg.content)}</p>`;
                log.innerHTML += `<p class="raw hidden" style="color:green;">[RAW]: ${msg.content}</p>`;
            });
        });
        function decryptAll() {
            if(prompt("Admin Key:") === "admin123") {
                document.querySelectorAll('.raw').forEach(el => el.classList.remove('hidden'));
            }
        }
    </script>
</body>
</html>
